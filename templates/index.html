{% extends 'base.html' %}

{% block content %}
    <h1 class="mb-4">📈 Market Terminal</h1>

    {% if news %}
    <div class="alert alert-info shadow-sm" role="alert">
        <h4 class="alert-heading">{{ news['headline'] }}</h4>
        <p class="mb-0">{{ news['story'] }}</p>
    </div>
    {% endif %}

    <div class="card shadow">
        <div class="card-body">
            <table class="table table-hover">
                <thead class="table-dark">
                    <tr>
                        <th>Stock</th>
                        <th>Symbol</th>
                        <th>Price</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody>
                    {% for stock in stocks %}
                    <tr>
                        <td>{{ stock['name'] }}</td>
                        <td><span class="badge bg-secondary">{{ stock['symbol'] }}</span></td>
                        <td class="fw-bold">${{ stock['current_price'] }}</td>
                        <td><button class="btn btn-sm btn-success">Buy</button></td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
{% endblock %}

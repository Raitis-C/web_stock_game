<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Dumpster Fire Trades{% endblock %}</title>
    <!-- Potential names:
            Dumpster Fire Trades
            or
            The Ego Index -->

    <link rel="stylesheet" href="{{ url_for('static', filename='bootstrap.min.css') }}">
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body class="d-flex flex-column min-vh-100 bg-light">

    <nav class="navbar navbar-expand-lg bg-white border-bottom border-4 border-dark shadow-sm sticky-top mb-4">
        <div class="container">
            <a class="navbar-brand fw-bold text-uppercase fs-4" href="/">
                <i class="bi bi-graph-up-arrow text-primary"></i> StockMaster
            </a>
            
            <button class="navbar-toggler border-2 border-dark" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto fw-bold">
                    <li class="nav-item">
                        <a class="nav-link text-dark" href="/">Market</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link text-dark" href="#">Portfolio</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link text-dark" href="#">Leaderboard</a>
                    </li>
                </ul>
                
                <div class="d-flex align-items-center">
                    <span class="badge bg-warning text-dark border border-2 border-dark fs-6 p-2 shadow-sm">
                        <i class="bi bi-wallet2"></i> Balance: $10,000
                    </span>
                </div>
            </div>
        </div>
    </nav>

    <main class="container flex-grow-1">
        
        {% block messages %}{% endblock %}

        {% block content %}{% endblock %}
        
    </main>

    <footer class="bg-white border-top border-4 border-dark mt-5 py-4">
        <div class="container text-center">
            <div class="row fw-bold mb-3">
                <div class="col">
                    <a href="#" class="text-dark text-decoration-none mx-3 hover-primary">How to Play</a>
                    <a href="#" class="text-dark text-decoration-none mx-3 hover-primary">Game Rules</a>
                    <a href="#" class="text-dark text-decoration-none mx-3 hover-primary">Reset Account</a>
                </div>
            </div>
            
            <p class="text-muted small mb-0 fw-bold">
                <i class="bi bi-controller"></i> &copy; 2026 StockMaster Simulation. All fake money reserved.
            </p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}StockMaster{% endblock %}</title>
    
    <link rel="stylesheet" href="{{ url_for('static', filename='bootstrap.min.css') }}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body class="d-flex flex-column min-vh-100 bg-light">

    <nav class="navbar navbar-expand-lg bg-white shadow-sm sticky-top mb-4">
        <div class="container">
            <a class="navbar-brand fw-black text-uppercase fs-4" href="/">
                <i class="bi bi-graph-up-arrow text-primary"></i> STOCKMASTER
            </a>
            
            <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto fw-bold text-uppercase">
                    <li class="nav-item"><a class="nav-link" href="/">Market</a></li>
                    <li class="nav-item"><a class="nav-link" href="#">Portfolio</a></li>
                    <li class="nav-item"><a class="nav-link" href="#">Leaderboard</a></li>
                </ul>
                
                <div class="d-flex align-items-center">
                    <span class="badge bg-warning text-dark fs-6 p-2 px-3 rounded-3 shadow-sm">
                        <i class="bi bi-wallet2 me-1"></i> Balance: $10,000
                    </span>
                </div>
            </div>
        </div>
    </nav>

    <main class="container flex-grow-1">
        {% block messages %}{% endblock %}
        {% block content %}{% endblock %}
    </main>

    <footer class="bg-white shadow-sm mt-5 py-4 border-top">
        <div class="container text-center">
            <div class="row fw-bold mb-3">
                <div class="col">
                    <a href="#" class="text-dark text-decoration-none mx-3 opacity-75">How to Play</a>
                    <a href="#" class="text-dark text-decoration-none mx-3 opacity-75">Game Rules</a>
                    <a href="#" class="text-danger text-decoration-none mx-3">Reset Account</a>
                </div>
            </div>
            
            <p class="text-muted small mb-0 fw-bold">
                <i class="bi bi-controller"></i> &copy; 2026 StockMaster Simulation. All fake money reserved.
            </p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        async function updatePrices() {
            try {
                const response = await fetch('/api/prices');
                const data = await response.json();

                for (const [symbol, price] of Object.entries(data)) {
                    const priceElement = document.getElementById(`price-${symbol}`);
                    if (priceElement) {
                        // Update the text
                        const oldPrice = parseFloat(priceElement.innerText);
                        priceElement.innerText = price.toFixed(2);

                        // --- OPTIONAL: Visual "Flash" Effect ---
                        if (price > oldPrice) {
                            priceElement.parentElement.style.color = "#a2e436"; // Brite Green
                        } else if (price < oldPrice) {
                            priceElement.parentElement.style.color = "#f56565"; // Brite Red
                        }
                        
                        // Reset color after 1 second
                        setTimeout(() => {
                            priceElement.parentElement.style.color = "";
                        }, 1000);
                    }
                }
            } catch (error) {
                console.error("Failed to fetch prices:", error);
            }
        }

        // Run every 5 seconds
        setInterval(updatePrices, 5000);
    </script>
</body>
</html>

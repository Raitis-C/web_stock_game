{% extends "base.html" %}

{% block content %}

<!-- ApexCharts MUST load before any script that uses it -->
<script src="https://cdn.jsdelivr.net/npm/apexcharts@5.10.6"></script>

<div class="container py-4">
    <div class="row mb-4">
        <div class="col">
            <h1 class="display-6 fw-bold text-uppercase">Market Dashboard</h1>
        </div>
    </div>

    <div class="row g-4">
        <div class="col-lg-8">
            <div class="d-flex flex-column gap-3" id="trending-container"></div>
        </div>

        <div class="col-lg-4">
            <div class="card shadow-sm border-0 rounded-4 bg-white sticky-top" style="top: 100px;">
                <div class="card-body p-4">
                    <h4 class="fw-bold mb-4 text-uppercase">Breaking News 📰</h4>
                    <div id="news-container" class="d-flex flex-column gap-3">
                        {% for item in news %}
                        <div class="p-3 rounded-3 border-0 bg-light shadow-sm">
                            <h6 class="fw-bold mb-2">{{ item.headline }}</h6>
                            <div class="d-flex justify-content-between align-items-center">
                                <span class="badge {% if item.impact > 0 %}bg-success{% else %}bg-danger{% endif %} rounded-pill">
                                    {{ "+" if item.impact > 0 }}{{ item.impact }}% Impact ({{ item.symbol }})
                                </span>
                                <small class="text-muted fst-italic fw-bold">Live</small>
                            </div>
                        </div>
                        {% endfor %}
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    // ── State ─────────────────────────────────────────────────────────────
    const dashCharts = {};
    let currentTop3  = [];

    // ── Helpers ───────────────────────────────────────────────────────────
    function fmtPrice(p) {
        if (p < 0.01)  return p.toFixed(6);
        if (p < 1)     return p.toFixed(4);
        if (p < 10)    return p.toFixed(3);
        return p.toFixed(2);
    }

    function formatTimeAgo(timestamp) {
        if (!timestamp) return "Just now";
        const eventTime    = new Date(timestamp + "Z");
        const diffInSecs   = Math.floor((Date.now() - eventTime) / 1000);
        if (diffInSecs < 60) return "Just now";
        return `${Math.floor(diffInSecs / 60)} min. ago`;
    }

    // ── Build a card + chart for one stock (called only when top 3 changes) ──
    async function buildCard(stock, sparklineData) {
        const { symbol, price, growth } = stock;
        const isPositive  = growth >= 0;
        const arrow       = isPositive ? "▲" : "▼";
        const colorClass  = isPositive ? "text-success" : "text-danger";

        // 1. Insert the card HTML
        const container = document.getElementById('trending-container');
        const cardHtml  = `
            <a href="/stock/${symbol}" class="text-decoration-none text-dark">
            <div class="card stock-card-custom shadow-sm border-0 rounded-4 overflow-hidden"
                 id="card-${symbol}">
                <div class="card-body d-flex p-0" style="min-height: 120px;">
                    <div class="chart-container-flat">
                        <div id="chart-${symbol}" style="width:100%;"></div>
                    </div>
                    <div class="d-flex flex-column justify-content-center p-4 bg-white border-start"
                         style="min-width: 200px;">
                        <div class="d-flex align-items-center gap-2 mb-1">
                            <span class="fw-bold fs-4">${symbol}</span>
                            <span class="badge bg-light text-dark border small">STK</span>
                        </div>
                        <div class="fs-4 fw-bold mb-1">
                            $<span id="price-${symbol}">${fmtPrice(price)}</span>
                        </div>
                        <div class="fs-6 fw-bold ${colorClass}" id="growth-${symbol}">
                            ${arrow} ${Math.abs(growth).toFixed(2)}%
                        </div>
                    </div>
                </div>
            </div>
            </a>`;
        container.insertAdjacentHTML('beforeend', cardHtml);

        // 2. Use pre-fetched sparkline data — no extra HTTP request needed
        const prices = sparklineData[symbol] || [];
        if (prices.length < 2) return;
        try {
            const chart = new ApexCharts(
                document.querySelector(`#chart-${symbol}`), {
                    series: [{ name: 'Price', data: prices }],
                    chart: {
                        type: 'area', height: 100,
                        sparkline: { enabled: true },
                        animations: { enabled: false }
                    },
                    stroke: { curve: 'smooth', width: 2 },
                    fill:   { opacity: 0.2 },
                    colors: [isPositive ? '#198754' : '#dc3545'],
                    tooltip: {
                        fixed: { enabled: false },
                        x: { show: false },
                        y: { title: { formatter: () => '' } },
                        marker: { show: false }
                    }
                }
            );
            chart.render();
            dashCharts[symbol] = chart;
        } catch (e) {
            console.error(`Chart build failed for ${symbol}:`, e);
        }
    }

    // ── Rebuild the whole trending section (only when symbols change) ─────
    async function rebuildTrending(top3, sparklineData) {
        for (const sym of currentTop3) {
            if (dashCharts[sym]) { dashCharts[sym].destroy(); delete dashCharts[sym]; }
        }
        document.getElementById('trending-container').innerHTML = '';
        currentTop3 = top3.map(s => s.symbol);
        for (const stock of top3) {
            await buildCard(stock, sparklineData);
        }
    }

    // ── Fast path: update numbers + chart data only ───────────────────────
    async function updateTrending(top3, sparklineData) {
        for (const stock of top3) {
            const { symbol, price, growth } = stock;
            const isPositive = growth >= 0;
            const arrow      = isPositive ? '▲' : '▼';
            const colorClass = isPositive ? 'text-success' : 'text-danger';

            const priceEl = document.getElementById(`price-${symbol}`);
            if (priceEl) priceEl.innerText = fmtPrice(price);

            const growthEl = document.getElementById(`growth-${symbol}`);
            if (growthEl) {
                growthEl.className = `fs-6 fw-bold ${colorClass}`;
                growthEl.innerText = `${arrow} ${Math.abs(growth).toFixed(2)}%`;
            }

            // Use pre-fetched bulk data — no extra request
            const prices = sparklineData[symbol] || [];
            if (dashCharts[symbol] && prices.length > 0) {
                dashCharts[symbol].updateSeries([{ name: 'Price', data: prices }]);
            }
        }
    }

    // ── Main tick ─────────────────────────────────────────────────────────
    async function updatePrices() {
        try {
            // Fetch prices + sparklines in parallel — 2 requests instead of 2+N
            const [priceRes, sparkRes] = await Promise.all([
                fetch('/api/prices'),
                fetch('/api/sparklines')
            ]);
            const allStocks    = await priceRes.json();
            const sparklineData = await sparkRes.json();

            const top3     = allStocks.slice(0, 3);
            const top3Syms = top3.map(s => s.symbol).join(',');
            const prevSyms = currentTop3.join(',');

            if (top3Syms !== prevSyms) {
                await rebuildTrending(top3, sparklineData);
            } else {
                await updateTrending(top3, sparklineData);
            }
        } catch (e) {
            console.error("updatePrices failed:", e);
        }
    }

    // ── News ──────────────────────────────────────────────────────────────
    async function updateNews() {
        try {
            const res      = await fetch('/api/news?t=' + Date.now());
            const newsItems = await res.json();
            const container = document.getElementById('news-container');
            if (!newsItems || newsItems.length === 0) return;

            container.innerHTML = '';
            newsItems.forEach(item => {
                const impactColor = item.impact > 0 ? 'bg-success' : 'bg-danger';
                const impactSign  = item.impact > 0 ? '+' : '';
                const timeLabel   = formatTimeAgo(item.triggered_at);
                container.insertAdjacentHTML('beforeend', `
                    <div class="p-3 rounded-3 border-0 bg-light shadow-sm">
                        <h6 class="fw-bold mb-2">${item.headline}</h6>
                        <div class="d-flex justify-content-between align-items-center">
                            <span class="badge ${impactColor} rounded-pill">
                                ${impactSign}${item.impact}% Impact (${item.symbol})
                            </span>
                            <small class="text-muted fst-italic fw-bold">${timeLabel}</small>
                        </div>
                    </div>`);
            });
        } catch (e) {
            console.error("updateNews failed:", e);
        }
    }

    // ── Boot ──────────────────────────────────────────────────────────────
    updatePrices();
    updateNews();
    setInterval(() => { updatePrices(); updateNews(); }, 5000);
</script>

{% endblock %}
